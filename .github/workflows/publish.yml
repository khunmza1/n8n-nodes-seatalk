name: Publish Node to npm

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # CRITICAL: This allows GitHub to ask npm for an authentic session

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm install

      - name: Build Code (Bypassing Lint)
        run: npx n8n-node build

      - name: Publish to npm with Provenance
        run: npm publish --provenance --access public --ignore-scripts
        # Note: We completely removed the env: NODE_AUTH_TOKEN line!